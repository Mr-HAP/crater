version: '3.8'

services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        user: crater-user
        uid: 1000
    image: crater-php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker-compose/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:rw,delegated
      - fakturo-storage:/var/www/storage
    networks:
      - crater

  nginx:
    image: nginx:1.17-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - fakturo-storage:/var/www/storage
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - crater

  cron:
    build:
      context: ./
      dockerfile: ./docker-compose/cron.dockerfile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - fakturo-storage:/var/www/storage
    networks:
      - crater

volumes:
  fakturo-storage:

networks:
  crater:
    driver: bridge
